<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>수강생 가이드 · Claude Code 비개발자 교육</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{
  --ink:#0f172a; --ink2:#1e293b; --muted:#64748b; --line:#e2e8f0;
  --brand:#4f46e5; --brand2:#7c3aed; --bg:#f8fafc;
}
*,*::before,*::after{box-sizing:border-box;}
html,body{font-family:'Pretendard',system-ui,sans-serif;color:var(--ink);background:#0f172a;margin:0;padding:0;height:100%;overflow:hidden;}
code,pre,.mono{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;}

/* 상단 헤더 (sticky) */
.top{position:fixed;top:0;left:0;right:0;height:54px;background:rgba(15,23,42,.92);backdrop-filter:blur(12px);border-bottom:1px solid #334155;color:#e2e8f0;z-index:50;display:flex;align-items:center;padding:0 20px;gap:14px;}
.top-title{font-weight:800;font-size:14px;color:#fff;}
.top-progress{flex:1;display:flex;align-items:center;gap:10px;max-width:520px;}
.bar{height:6px;background:#1e293b;border-radius:999px;flex:1;overflow:hidden;}
.bar-fill{height:100%;background:linear-gradient(90deg,#4f46e5,#06b6d4);transition:width .3s ease;}
.bar-text{font-size:12px;font-family:'JetBrains Mono',monospace;font-weight:700;color:#a5b4fc;min-width:60px;}
.top-actions{margin-left:auto;display:flex;gap:8px;align-items:center;}
.top-btn{background:rgba(255,255,255,.08);color:#e2e8f0;border:1px solid rgba(255,255,255,.12);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;}
.top-btn:hover{background:rgba(255,255,255,.14);}
.top-btn.help{background:#dc2626;border-color:#b91c1c;}
.top-btn.help:hover{background:#b91c1c;}

/* 단계 picker (드롭다운) */
.picker{position:fixed;top:62px;right:18px;background:#1e293b;border:1px solid #334155;border-radius:12px;width:340px;max-height:70vh;overflow-y:auto;z-index:60;box-shadow:0 20px 50px -10px rgba(0,0,0,.5);display:none;}
.picker.open{display:block;}
.picker-header{padding:10px 14px;border-bottom:1px solid #334155;color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;}
.picker-phase{padding:6px 6px;}
.picker-phase-title{font-size:10.5px;font-weight:700;color:#a5b4fc;padding:6px 10px;text-transform:uppercase;letter-spacing:0.06em;}
.picker-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;color:#cbd5e1;font-size:13px;cursor:pointer;}
.picker-item:hover{background:rgba(99,102,241,.2);color:#fff;}
.picker-item.current{background:#4f46e5;color:#fff;font-weight:700;}
.picker-item.done{color:#64748b;text-decoration:line-through;}
.picker-item .num{font-family:'JetBrains Mono',monospace;font-size:11px;opacity:.6;min-width:24px;}

/* 메인 영역 */
.stage{position:absolute;top:54px;left:0;right:0;bottom:62px;display:flex;align-items:center;justify-content:center;padding:20px 28px;}
.page{width:100%;max-width:1400px;height:100%;background:#f8fafc;border-radius:20px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;box-shadow:0 30px 80px -30px rgba(0,0,0,.5);animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

/* 좌측: 시각자료 */
.visual{background:linear-gradient(135deg,#1e293b,#0f172a);color:#e2e8f0;padding:36px 38px;display:flex;flex-direction:column;justify-content:center;overflow-y:auto;}
.visual-label{font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;}
.terminal{background:#020617;border-radius:10px;overflow:hidden;border:1px solid #334155;}
.terminal-bar{background:#1e293b;padding:8px 14px;display:flex;align-items:center;gap:6px;border-bottom:1px solid #334155;}
.terminal-bar .dot{width:10px;height:10px;border-radius:50%;}
.terminal-bar .red{background:#ef4444;}
.terminal-bar .yellow{background:#f59e0b;}
.terminal-bar .green{background:#10b981;}
.terminal-bar .title{font-size:11px;color:#94a3b8;margin-left:8px;font-family:'JetBrains Mono',monospace;}
.terminal-body{padding:16px 18px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.75;}
.terminal-body .prompt{color:#86efac;}
.terminal-body .cmd{color:#22d3ee;}
.terminal-body .ok{color:#86efac;}
.terminal-body .err{color:#f87171;}
.terminal-body .info{color:#cbd5e1;}
.terminal-body .comment{color:#64748b;}
.terminal-body .yellow{color:#fde047;}
.terminal-body .cursor{display:inline-block;width:8px;height:14px;background:#86efac;margin-left:2px;animation:blink 1s infinite;vertical-align:middle;}
@keyframes blink{50%{opacity:0;}}

.browser-mock{background:#fff;color:#0f172a;border-radius:10px;border:1px solid #334155;overflow:hidden;}
.browser-bar{background:#e2e8f0;padding:8px 14px;display:flex;align-items:center;gap:6px;}
.browser-bar .url{flex:1;background:#fff;border-radius:6px;padding:4px 10px;font-size:11px;font-family:'JetBrains Mono',monospace;color:#64748b;}
.browser-body{padding:24px;}

.file-preview{background:#fff;color:#0f172a;border-radius:10px;border:1px solid #334155;padding:20px 24px;}
.file-preview h4{font-weight:700;margin-bottom:10px;font-size:15px;}

.visual-note{margin-top:14px;font-size:12px;color:#94a3b8;line-height:1.6;text-align:center;}

/* 우측: 설명 */
.content{padding:36px 44px;overflow-y:auto;background:#fff;}
.step-num{display:inline-block;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-family:'JetBrains Mono',monospace;padding:4px 12px;border-radius:8px;font-size:12px;font-weight:700;margin-bottom:6px;letter-spacing:0.04em;}
.step-chip{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;margin-left:6px;}
.step-chip.required{background:#fff1f2;color:#be123c;}
.step-chip.optional{background:#fffbeb;color:#b45309;}
.step-chip.practice{background:#ecfdf5;color:#047857;}
.step-title{font-size:26px;font-weight:800;letter-spacing:-0.02em;margin:4px 0 6px;line-height:1.25;}
.step-sub{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:18px;}

.block{margin-bottom:18px;}
.block-h{font-size:12px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.block ul{font-size:14px;line-height:1.8;padding-left:18px;color:#334155;}
.block ul li{margin-bottom:2px;}
.block ol{font-size:14px;line-height:1.8;padding-left:22px;color:#334155;}
.block p{font-size:14px;line-height:1.7;color:#334155;}

.code{position:relative;background:#0f172a;color:#e2e8f0;border-radius:8px;padding:12px 16px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word;overflow-x:auto;}
.code-copy{position:absolute;top:6px;right:6px;background:rgba(255,255,255,.08);color:#cbd5e1;border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:3px 9px;font-size:11px;cursor:pointer;font-family:'Pretendard',sans-serif;opacity:.55;}
.code-copy:hover{opacity:1;background:rgba(255,255,255,.2);color:#fff;}
.code-copy.copied{background:#10b981;color:#fff;border-color:#10b981;opacity:1;}

.success-box,.fail-box,.tip-box{padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.55;margin:8px 0;}
.success-box{background:#ecfdf5;border-left:3px solid #10b981;color:#065f46;}
.success-box b{color:#047857;}
.fail-box{background:#fff1f2;border-left:3px solid #ef4444;color:#7f1d1d;}
.fail-box b{color:#b91c1c;}
.tip-box{background:#fffbeb;border-left:3px solid #f59e0b;color:#7c2d12;}
.tip-box b{color:#b45309;}

.kbd{font-family:'JetBrains Mono',monospace;background:#0f172a;color:#e2e8f0;padding:2px 7px;border-radius:5px;font-size:12px;}

/* 완료 체크 + 메모 */
.check-area{margin-top:20px;padding-top:18px;border-top:1px solid var(--line);}
.check-label{display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;font-weight:600;color:#334155;}
.check-label input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:#10b981;}
.check-label.done{color:#10b981;}
.memo-area{margin-top:12px;}
.memo-label{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
.memo-input{width:100%;background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-family:inherit;font-size:13px;color:#0f172a;resize:vertical;min-height:60px;line-height:1.55;}
.memo-input:focus{outline:none;border-color:#4f46e5;background:#fff;}

/* 하단 네비 */
.nav-bottom{position:fixed;bottom:0;left:0;right:0;height:62px;background:rgba(15,23,42,.92);backdrop-filter:blur(12px);border-top:1px solid #334155;display:flex;align-items:center;justify-content:center;gap:14px;padding:0 20px;z-index:50;}
.nav-btn{background:#4f46e5;color:#fff;border:none;padding:10px 20px;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px;}
.nav-btn:hover{background:#4338ca;}
.nav-btn:disabled{background:#334155;color:#64748b;cursor:not-allowed;}
.nav-btn.secondary{background:transparent;border:1px solid #334155;color:#cbd5e1;}
.nav-btn.secondary:hover{background:#1e293b;color:#fff;}
.nav-counter{color:#cbd5e1;font-size:13px;font-family:'JetBrains Mono',monospace;font-weight:600;min-width:80px;text-align:center;}

/* 좌우 화살표 */
.side-arrow{position:fixed;top:50%;transform:translateY(-50%);width:46px;height:90px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);cursor:pointer;z-index:55;color:#cbd5e1;font-size:24px;border-radius:12px;transition:background .15s;}
.side-arrow:hover{background:rgba(255,255,255,.12);color:#fff;}
.side-arrow:disabled{opacity:.3;cursor:not-allowed;}
.side-arrow.left{left:14px;}
.side-arrow.right{right:14px;}

@media (max-width:1024px){
  .page{grid-template-columns:1fr;grid-template-rows:auto 1fr;}
  .visual{padding:24px;max-height:40vh;}
}
</style>
</head>
<body>

<!-- 상단 -->
<header class="top">
  <div class="top-title">📚 수강생 가이드</div>
  <div class="top-progress">
    <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
    <div class="bar-text" id="bar-text">0 / 0</div>
  </div>
  <div class="top-actions">
    <button class="top-btn" onclick="togglePicker()">≡ 단계 목록</button>
    <button class="top-btn help" onclick="alert('손 들어주세요!\\n보조강사가 즉시 달려갑니다 🏃‍♀️')">🆘 막혔어요</button>
    <button class="top-btn" onclick="if(confirm('체크 + 메모 초기화?')){localStorage.removeItem(KEY);location.reload();}" title="초기화">♻️</button>
  </div>
</header>

<!-- 단계 picker -->
<div class="picker" id="picker"></div>

<!-- 좌/우 화살표 -->
<button class="side-arrow left" id="arrow-prev" onclick="go(-1)">‹</button>
<button class="side-arrow right" id="arrow-next" onclick="go(1)">›</button>

<!-- 메인 무대 -->
<div class="stage">
  <div class="page" id="page"></div>
</div>

<!-- 하단 -->
<footer class="nav-bottom">
  <button class="nav-btn secondary" onclick="go('first')">⏮ 처음</button>
  <button class="nav-btn" id="btn-prev" onclick="go(-1)">◀ 이전</button>
  <div class="nav-counter" id="nav-counter">0 / 0</div>
  <button class="nav-btn" id="btn-next" onclick="go(1)">다음 ▶</button>
  <button class="nav-btn secondary" onclick="go('last')">⏭ 마지막</button>
</footer>

<script>
const KEY = 'student-guide-v2';

// ============================================================
// 14개 단계 정의 — 각 단계는 visual(좌) + content(우)
// ============================================================
const phases = [
  {title:'준비 · 필수 도구',  steps:[1,2,3]},
  {title:'Claude Code 시작',  steps:[4,5,6]},
  {title:'Dooray 연동',       steps:[7]},
  {title:'실습 따라하기',     steps:[8,9,10,11,12]},
  {title:'마무리',            steps:[13,14]},
];

const steps = [
  {
    id:1, badge:'01', chip:{type:'required', text:'필수'}, phase:'준비',
    title:'Node.js 확인 / 설치',
    sub:'Claude Code의 엔진. 모든 설치의 출발점이에요.',
    visual: terminalMock('node --version', 'v22.15.0', '이런 숫자 = 이미 설치됨'),
    blocks:[
      {h:'📌 이번 단계에 할 것', kind:'ol', items:[
        '터미널에서 <span class="kbd">node --version</span> 입력',
        '숫자(v18 이상) 나오면 → 통과',
        '에러 나오면 → <b>nodejs.org</b>에서 LTS 다운로드 → 설치'
      ]},
      {h:'⚠️ 중요', kind:'tip', text:'설치 후 <b>터미널 완전히 닫고 새로 열기</b>. 안 그러면 여전히 "없음" 뜸.'},
      {h:'✅ 성공 화면', kind:'success', text:'<span class="mono">v22.15.0</span> 처럼 숫자가 나옴'},
      {h:'❌ 미설치 화면', kind:'fail', text:'<span class="mono">command not found: node</span>'}
    ]
  },
  {
    id:2, badge:'02', chip:{type:'required', text:'필수'}, phase:'준비',
    title:'Git 확인 / 설치',
    sub:'스킬·MCP 설치, GitHub 사용에 필요합니다.',
    visual: terminalMock('git --version', 'git version 2.43.0', '버전 번호 보이면 OK'),
    blocks:[
      {h:'📌 이번 단계에 할 것', kind:'ol', items:[
        '<span class="kbd">git --version</span> 입력',
        '버전 번호 보이면 통과',
        '없으면: <b>Mac</b> → 팝업 "설치" 클릭 / <b>Win</b> → <b>git-scm.com</b> 다운로드'
      ]},
      {h:'✅ 성공', kind:'success', text:'<span class="mono">git version 2.x.x</span>'}
    ]
  },
  {
    id:3, badge:'03', chip:{type:'required', text:'필수'}, phase:'준비',
    title:'Python 확인 / 설치',
    sub:'Dooray MCP 설치 마법사 + 데이터 분석에 사용해요.',
    visual: terminalMock('python3 --version', 'Python 3.13.0', '3.11 이상이면 통과'),
    blocks:[
      {h:'📌 이번 단계에 할 것', kind:'ol', items:[
        '<span class="kbd">python3 --version</span> 입력',
        '3.11 이상이면 통과',
        '없으면 <b>python.org</b>에서 3.13 다운로드'
      ]},
      {h:'⚠️ Windows 사용자', kind:'tip', text:'설치 마법사에서 <b>"Add Python to PATH" 체크 필수.</b> 안 하면 명령어가 안 먹혀요.'},
    ]
  },
  {
    id:4, badge:'04', chip:{type:'required', text:'필수'}, phase:'Claude Code',
    title:'Claude Code 설치',
    sub:'이번 강의의 핵심 도구. 한 번 설치하면 다음부턴 <span class="kbd">claude</span> 한 글자.',
    visual: terminalMock(
      'npm install -g @anthropic-ai/claude-code',
      'added 312 packages in 78s',
      'added N packages 보이면 성공'
    ),
    blocks:[
      {h:'💻 방법 A · npm으로 (가장 일반적)', kind:'code', text:'npm install -g @anthropic-ai/claude-code'},
      {h:'🚑 방법 B · 한 줄 설치 (npm 막혔을 때)', kind:'code-os', win:'irm https://claude.ai/install.ps1 | iex', mac:'curl -fsSL https://claude.ai/install.sh | bash'},
      {h:'✅ 확인', kind:'code', text:'claude --version'},
      {h:'성공 신호', kind:'success', text:'버전 번호가 나오면 완료. 막히면 왼쪽 🆘 버튼!'}
    ]
  },
  {
    id:5, badge:'05', chip:{type:'required', text:'필수'}, phase:'Claude Code',
    title:'첫 로그인',
    sub:'Anthropic 계정 + Pro($20/월) 이상이 필요해요. 없으면 claude.ai에서 먼저 구독.',
    visual: browserMock('claude.ai/login', 'Anthropic 로그인 → 권한 허용 → Welcome to Claude Code!'),
    blocks:[
      {h:'💻 실행', kind:'code', text:'claude'},
      {h:'📌 진행 순서', kind:'ol', items:[
        '브라우저가 자동으로 열림',
        'Anthropic 계정 로그인',
        '권한 "Allow" 클릭',
        '테마 선택 (Dark 추천)'
      ]},
      {h:'✅ 성공', kind:'success', text:'<span class="mono">&gt;</span> 커서가 깜빡이면 입력 준비 완료'}
    ]
  },
  {
    id:6, badge:'06', chip:{type:'required', text:'필수'}, phase:'Claude Code',
    title:'첫 대화 — 진짜 동작하는지 확인',
    sub:'아무 명령어나 하나 시켜봅시다. 권한 팝업은 Yes 누르면 OK.',
    visual: terminalMock(
      '"내 바탕화면에 뭐가 있는지 알려줘"',
      '바탕화면에 다음 파일들이 있어요:\\n- 매출_데이터_2026년4월.xlsx\\n- 메일_발송_명단.xlsx\\n- 팀원_업무현황.xlsx',
      'Claude가 본인 파일 목록을 읽어줌 = 완전 성공'
    ),
    blocks:[
      {h:'💬 프롬프트', kind:'code', text:'"내 바탕화면에 뭐가 있는지 알려줘"'},
      {h:'✅ 이러면 완전 성공', kind:'success', text:'Claude가 본인 파일 목록을 읽어서 보여줌 🎉'},
      {h:'⚠️ 권한 팝업이 떠요', kind:'tip', text:'<b>Yes(1번)</b> 선택. 처음엔 매번 묻는 게 정상입니다. 익숙해지면 "Always allow"로.'}
    ]
  },
  {
    id:7, badge:'07', chip:{type:'required', text:'과제 제출에 필요'}, phase:'Dooray',
    title:'Dooray MCP 설치',
    sub:'두레이를 터미널에서 한국어로 조작하게 됩니다. 과제 제출도 이걸로 해요.',
    visual: terminalMock(
      'python setup.py',
      '✓ 토큰 검증 완료\\n✓ MCP 등록 완료\\n✓ Claude Code 재시작 후 사용 가능',
      '"내 두레이 태스크 보여줘" 동작하면 완료'
    ),
    blocks:[
      {h:'1️⃣ API 토큰 발급', kind:'ol', items:[
        '<b>nhnent.dooray.com</b> 접속',
        '우상단 프로필 → 설정 → API 토큰',
        '"토큰 생성" 클릭 → 토큰 복사 (조직코드:토큰값)'
      ]},

// ============================================================
// State
// ============================================================
function loadState(){ try { return JSON.parse(localStorage.getItem(KEY) || '{}'); } catch { return {}; } }
function saveState(s){ localStorage.setItem(KEY, JSON.stringify(s)); }
let state = loadState();
if(!state.checks) state.checks = {};
if(!state.memos) state.memos = {};
if(state.current === undefined){
  const hash = parseInt(location.hash.slice(1));
  state.current = (!isNaN(hash) && hash>=1 && hash<=steps.length) ? hash-1 : 0;
}

// ============================================================
// Render
// ============================================================
const page = document.getElementById('page');
function render(){
  const s = steps[state.current];
  const chipClass = s.chip ? `step-chip ${s.chip.type}` : '';
  const chipHtml = s.chip ? `<span class="${chipClass}">${s.chip.text}</span>` : '';

  let blocksHtml = '';
  for(const b of s.blocks){
    if(b.kind === 'ol'){
      blocksHtml += `<div class="block"><div class="block-h">${b.h}</div><ol>${b.items.map(i=>`<li>${i}</li>`).join('')}</ol></div>`;
    } else if(b.kind === 'ul'){
      blocksHtml += `<div class="block"><div class="block-h">${b.h}</div><ul>${b.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
    } else if(b.kind === 'code'){
      blocksHtml += `<div class="block"><div class="block-h">${b.h}</div><div class="code">${escapeHTML(b.text)}<button class="code-copy" onclick="copyCode(this)">📋 복사</button></div></div>`;
    } else if(b.kind === 'code-os'){
      blocksHtml += `<div class="block"><div class="block-h">${b.h}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div><div style="font-size:11px;color:#64748b;font-weight:700;margin-bottom:3px;">🪟 Windows</div><div class="code" style="font-size:12px;">${escapeHTML(b.win)}<button class="code-copy" onclick="copyCode(this)">📋</button></div></div>
          <div><div style="font-size:11px;color:#64748b;font-weight:700;margin-bottom:3px;">🍎 Mac</div><div class="code" style="font-size:12px;">${escapeHTML(b.mac)}<button class="code-copy" onclick="copyCode(this)">📋</button></div></div>
        </div></div>`;
    } else if(b.kind === 'success'){
      blocksHtml += `<div class="block"><div class="block-h">${b.h}</div><div class="success-box">✅ ${b.text}</div></div>`;
    } else if(b.kind === 'fail'){
      blocksHtml += `<div class="block"><div class="block-h">${b.h}</div><div class="fail-box">${b.text}</div></div>`;
    } else if(b.kind === 'tip'){
      blocksHtml += `<div class="block"><div class="block-h">${b.h}</div><div class="tip-box">💡 ${b.text}</div></div>`;
    } else if(b.kind === 'p'){
      blocksHtml += `<div class="block"><div class="block-h">${b.h}</div><p>${b.text}</p></div>`;
    } else if(b.kind === 'download'){
      blocksHtml += `<div class="block"><div class="block-h">${b.h}</div><a href="sample-data/${b.file}" download style="display:inline-flex;align-items:center;gap:8px;padding:8px 14px;background:#4f46e5;color:#fff;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600;">⬇️ ${b.file}</a></div>`;
    }
  }

  const isDone = !!state.checks[s.id];
  const memo = state.memos[s.id] || '';

  page.innerHTML = `
    <div class="visual">${s.visual}</div>
    <div class="content">
      <span class="step-num">STEP ${s.badge}</span>${chipHtml}
      <div class="step-title">${s.title}</div>
      <div class="step-sub">${s.sub}</div>
      ${blocksHtml}
      <div class="check-area">
        <label class="check-label ${isDone?'done':''}" id="check-label">
          <input type="checkbox" id="step-done" ${isDone?'checked':''} onchange="toggleDone()">
          이 단계 완료했어요
        </label>
        <div class="memo-area">
          <div class="memo-label">📝 내 메모 (자동 저장)</div>
          <textarea class="memo-input" id="memo-input" placeholder="이 단계에서 막힌 점, 추가로 시도해본 것, 본인 업무에 응용할 아이디어 등 자유롭게..." oninput="saveMemo()">${escapeHTML(memo)}</textarea>
        </div>
      </div>
    </div>
  `;

  // 진행률·카운터
  const total = steps.length;
  const done = Object.values(state.checks).filter(Boolean).length;
  document.getElementById('bar-fill').style.width = (done/total*100) + '%';
  document.getElementById('bar-text').textContent = `${done} / ${total}`;
  document.getElementById('nav-counter').textContent = `${state.current+1} / ${total}`;

  document.getElementById('btn-prev').disabled = state.current === 0;
  document.getElementById('btn-next').disabled = state.current === total-1;
  document.getElementById('arrow-prev').disabled = state.current === 0;
  document.getElementById('arrow-next').disabled = state.current === total-1;

  location.hash = String(state.current+1);
  renderPicker();
}
function escapeHTML(s){ return s.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }

function toggleDone(){
  const s = steps[state.current];
  state.checks[s.id] = document.getElementById('step-done').checked;
  saveState(state);
  document.getElementById('check-label').classList.toggle('done', state.checks[s.id]);
  // re-render to update progress
  const fillW = (Object.values(state.checks).filter(Boolean).length / steps.length * 100);
  document.getElementById('bar-fill').style.width = fillW + '%';
  document.getElementById('bar-text').textContent = `${Object.values(state.checks).filter(Boolean).length} / ${steps.length}`;
  renderPicker();
}
function saveMemo(){
  const s = steps[state.current];
  state.memos[s.id] = document.getElementById('memo-input').value;
  saveState(state);
}

// ============================================================
// 네비
// ============================================================
function go(dir){
  if(dir === 'first') state.current = 0;
  else if(dir === 'last') state.current = steps.length-1;
  else if(typeof dir === 'number'){
    const next = state.current + dir;
    if(next < 0 || next >= steps.length) return;
    state.current = next;
  } else if(typeof dir === 'string' && !isNaN(parseInt(dir))){
    state.current = parseInt(dir);
  }
  saveState(state);
  render();
}
window.addEventListener('keydown', (e) => {
  if(e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if(document.getElementById('picker').classList.contains('open') && e.key === 'Escape'){
    togglePicker(); e.preventDefault(); return;
  }
  if(e.key === 'ArrowRight' || e.key === ' ') { go(1); e.preventDefault(); }
  else if(e.key === 'ArrowLeft') { go(-1); e.preventDefault(); }
  else if(e.key === 'Home') { go('first'); e.preventDefault(); }
  else if(e.key === 'End') { go('last'); e.preventDefault(); }
});

// ============================================================
// 단계 picker
// ============================================================
function renderPicker(){
  const picker = document.getElementById('picker');
  let html = `<div class="picker-header">전체 14단계 · 클릭으로 점프</div>`;
  for(const phase of phases){
    html += `<div class="picker-phase"><div class="picker-phase-title">${phase.title}</div>`;
    for(const stepId of phase.steps){
      const s = steps[stepId-1];
      const isCurrent = state.current === stepId-1;
      const isDone = !!state.checks[s.id];
      html += `<div class="picker-item ${isCurrent?'current':''} ${isDone?'done':''}" onclick="go('${stepId-1}'); togglePicker();">
        <span class="num">${s.badge}</span>
        <span>${s.title}</span>
      </div>`;
    }
    html += `</div>`;
  }
  picker.innerHTML = html;
}
function togglePicker(){
  document.getElementById('picker').classList.toggle('open');
}
document.addEventListener('click', (e) => {
  const picker = document.getElementById('picker');
  const btn = document.querySelector('button[onclick*="togglePicker"]');
  if(picker.classList.contains('open') && !picker.contains(e.target) && !(btn && btn.contains(e.target))){
    picker.classList.remove('open');
  }
});

function copyCode(btn){
  const code = btn.parentElement;
  const text = (code.innerText || '').replace(/📋\s*(복사)?\s*$/,'').trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 복사'; btn.classList.remove('copied'); }, 1500);
  });
}

// 시작
render();
</script>
